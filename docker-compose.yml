services:
  api:
    image: ${IMAGE_NAME:-qwen3-tts}:${IMAGE_TAG:-cu130-sm86}
    container_name: ${CONTAINER_NAME:-qwen3-tts}
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BASE_IMAGE: ${BASE_IMAGE:-nvidia/cuda:13.0.0-devel-ubuntu24.04}
        FLASH_ATTN_WHEEL_ARCH: ${FLASH_ATTN_WHEEL_ARCH:-sm86}
    environment:
      MODEL_PATH: ${MODEL_PATH:-/models/Qwen3-TTS-12Hz-1.7B-Base}
      DEVICE_MAP: ${DEVICE_MAP:-cuda:0}
      ATTN_IMPLEMENTATION: ${ATTN_IMPLEMENTATION:-flash_attention_2}
      MAX_WORKERS: ${MAX_WORKERS:-1}
      CUDA_VISIBLE_DEVICES: ${CUDA_VISIBLE_DEVICES:-0}
    ports:
      - "${PORT:-8000}:8000"
    volumes:
      - ./voices:/app/voices
      - ./:/models:ro
    gpus: all
    shm_size: ${SHM_SIZE:-8gb}
    restart: unless-stopped
