<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Qwen3-TTS Multi-Model Test</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0f0f1a;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding: 32px 16px;
        }

        .container {
            width: 540px;
            background: linear-gradient(145deg, #1a1a2e, #16162a);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 16px;
            padding: 32px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }

        h1 {
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: 4px;
            background: linear-gradient(135deg, #a78bfa, #60a5fa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            font-size: 0.78rem;
            color: #666;
            margin-bottom: 20px;
        }

        /* ── API field ── */
        .api-row {
            margin-bottom: 18px;
        }

        /* ── Tabs ── */
        .tabs {
            display: flex;
            gap: 4px;
            margin-bottom: 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            padding-bottom: 0;
        }

        .tab-btn {
            padding: 10px 14px;
            border: none;
            background: none;
            color: #888;
            font-family: inherit;
            font-size: 0.82rem;
            font-weight: 600;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            transition: all 0.2s;
        }

        .tab-btn:hover {
            color: #bbb;
        }

        .tab-btn.active {
            color: #a78bfa;
            border-bottom-color: #a78bfa;
        }

        .tab-panel {
            display: none;
        }

        .tab-panel.active {
            display: block;
        }

        /* ── Form elements ── */
        label {
            display: block;
            font-size: 0.72rem;
            font-weight: 500;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 5px;
        }

        input,
        textarea,
        select {
            width: 100%;
            background: #12121f;
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 10px;
            padding: 11px 13px;
            color: #e0e0e0;
            font-family: inherit;
            font-size: 0.88rem;
            outline: none;
            transition: border-color 0.2s;
            margin-bottom: 14px;
        }

        input:focus,
        textarea:focus,
        select:focus {
            border-color: #a78bfa;
        }

        textarea {
            resize: vertical;
            min-height: 80px;
        }

        select {
            cursor: pointer;
            appearance: none;
        }

        .hint {
            font-size: 0.7rem;
            color: #555;
            margin-top: -10px;
            margin-bottom: 12px;
        }

        .btn {
            width: 100%;
            padding: 13px;
            border: none;
            border-radius: 10px;
            font-family: inherit;
            font-size: 0.92rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            background: linear-gradient(135deg, #7c3aed, #3b82f6);
            color: #fff;
        }

        .btn:hover {
            opacity: 0.9;
            transform: translateY(-1px);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none;
        }

        .status {
            margin-top: 14px;
            padding: 11px 13px;
            border-radius: 10px;
            font-size: 0.8rem;
            display: none;
        }

        .status.loading {
            display: block;
            background: #1e1e3a;
            color: #a78bfa;
        }

        .status.error {
            display: block;
            background: #2a1520;
            color: #f87171;
        }

        .status.success {
            display: block;
            background: #152a1a;
            color: #4ade80;
        }

        .audio-box {
            margin-top: 14px;
            display: none;
        }

        .audio-box audio {
            width: 100%;
            border-radius: 10px;
            outline: none;
        }

        .model-badge {
            display: inline-block;
            font-size: 0.65rem;
            padding: 2px 8px;
            border-radius: 6px;
            background: rgba(167, 139, 250, 0.15);
            color: #a78bfa;
            margin-bottom: 14px;
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>🎙 Qwen3-TTS</h1>
        <p class="subtitle">Multi-Model TTS Test</p>

        <div class="api-row">
            <label for="api">API Server</label>
            <input id="api" type="text" value="http://210.182.182.205:8010">
        </div>

        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('clone')">Voice Clone</button>
            <button class="tab-btn" onclick="switchTab('design')">Voice Design</button>
            <button class="tab-btn" onclick="switchTab('custom')">Custom Voice</button>
        </div>

        <!-- ═══ Voice Clone Tab ═══ -->
        <div id="tab-clone" class="tab-panel active">
            <span class="model-badge">Base Model</span>

            <label for="clone-voice">Saved Voice</label>
            <select id="clone-voice">
                <option value="">불러오는 중...</option>
            </select>

            <label for="clone-text">Text</label>
            <textarea id="clone-text" placeholder="합성할 텍스트를 입력하세요...">안녕하세요, 음성 합성 테스트입니다.</textarea>

            <label for="clone-lang">Language</label>
            <select id="clone-lang">
                <option value="Auto">Auto</option>
                <option value="Korean" selected>Korean</option>
                <option value="English">English</option>
                <option value="Chinese">Chinese</option>
                <option value="Japanese">Japanese</option>
            </select>

            <button class="btn" onclick="synthesizeClone()">Synthesize ▶</button>
        </div>

        <!-- ═══ Voice Design Tab ═══ -->
        <div id="tab-design" class="tab-panel">
            <span class="model-badge">VoiceDesign Model</span>

            <label for="design-instruct">Voice Description (Instruct)</label>
            <textarea id="design-instruct"
                placeholder="음색과 스타일을 자연어로 기술하세요...">밝고 활기찬 젊은 여성 목소리, 빠르고 경쾌하게 말하기</textarea>
            <p class="hint">예: "낮은 톤의 차분한 남성 목소리", "Excited young male with high pitch"</p>

            <label for="design-text">Text</label>
            <textarea id="design-text" placeholder="합성할 텍스트를 입력하세요...">안녕하세요, 음성 디자인 테스트입니다.</textarea>

            <label for="design-lang">Language</label>
            <select id="design-lang">
                <option value="Auto">Auto</option>
                <option value="Korean" selected>Korean</option>
                <option value="English">English</option>
                <option value="Chinese">Chinese</option>
                <option value="Japanese">Japanese</option>
            </select>

            <button class="btn" onclick="synthesizeDesign()">Design & Speak ▶</button>
        </div>

        <!-- ═══ Custom Voice Tab ═══ -->
        <div id="tab-custom" class="tab-panel">
            <span class="model-badge">CustomVoice Model</span>

            <label for="custom-speaker">Speaker</label>
            <select id="custom-speaker">
                <option value="">불러오는 중...</option>
            </select>

            <label for="custom-instruct">Style Instruct (Optional)</label>
            <textarea id="custom-instruct" rows="2" placeholder="스타일 지시를 입력하세요 (선택)"></textarea>
            <p class="hint">예: "빠르게 말하기", "슬프고 낮은 톤으로", "Very excited and energetic"</p>

            <label for="custom-text">Text</label>
            <textarea id="custom-text" placeholder="합성할 텍스트를 입력하세요...">안녕하세요, 커스텀 보이스 테스트입니다.</textarea>

            <label for="custom-lang">Language</label>
            <select id="custom-lang">
                <option value="Auto">Auto</option>
                <option value="Korean" selected>Korean</option>
                <option value="English">English</option>
                <option value="Chinese">Chinese</option>
                <option value="Japanese">Japanese</option>
            </select>

            <button class="btn" onclick="synthesizeCustom()">Synthesize ▶</button>
        </div>

        <div class="status" id="status"></div>
        <div class="audio-box" id="audioBox">
            <audio id="player" controls></audio>
        </div>
    </div>

    <script>
        const $ = id => document.getElementById(id);
        const baseUrl = () => $('api').value.trim();

        // ── Tab switching ─────────────────────────────────────────────
        function switchTab(name) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
            event.target.classList.add('active');
            $('tab-' + name).classList.add('active');
        }

        // ── Load voices ───────────────────────────────────────────────
        async function loadVoices() {
            const sel = $('clone-voice');
            try {
                const res = await fetch(`${baseUrl()}/tts/voices`);
                const data = await res.json();
                sel.innerHTML = '';
                if (data.voices.length === 0) {
                    sel.innerHTML = '<option value="">등록된 음성 없음</option>';
                    return;
                }
                data.voices.forEach(v => {
                    const opt = document.createElement('option');
                    opt.value = v.voice_id;
                    opt.textContent = v.name;
                    sel.appendChild(opt);
                });
            } catch (e) {
                sel.innerHTML = '<option value="">⚠ 음성 목록 로드 실패</option>';
            }
        }

        // ── Load speakers ─────────────────────────────────────────────
        async function loadSpeakers() {
            const sel = $('custom-speaker');
            try {
                const res = await fetch(`${baseUrl()}/tts/speakers`);
                const data = await res.json();
                sel.innerHTML = '';
                data.speakers.forEach(s => {
                    const opt = document.createElement('option');
                    opt.value = s.name;
                    opt.textContent = `${s.name} — ${s.description}`;
                    sel.appendChild(opt);
                });
            } catch (e) {
                sel.innerHTML = '<option value="">⚠ 스피커 목록 로드 실패</option>';
            }
        }

        $('api').addEventListener('change', () => { loadVoices(); loadSpeakers(); });
        loadVoices();
        loadSpeakers();

        // ── Common request helper ─────────────────────────────────────
        async function doRequest(url, formData) {
            const status = $('status');
            const audioBox = $('audioBox');
            const player = $('player');

            // Disable all buttons
            document.querySelectorAll('.btn').forEach(b => b.disabled = true);
            audioBox.style.display = 'none';
            player.src = '';
            status.className = 'status loading';
            status.style.display = 'block';

            const t0 = performance.now();
            const timer = setInterval(() => {
                const elapsed = ((performance.now() - t0) / 1000).toFixed(1);
                status.textContent = `⏳ 생성 중... ${elapsed}s`;
            }, 100);

            try {
                const res = await fetch(url, { method: 'POST', body: formData });
                clearInterval(timer);
                const elapsed = ((performance.now() - t0) / 1000).toFixed(1);

                if (!res.ok) {
                    const err = await res.text();
                    throw new Error(`${res.status} — ${err}`);
                }

                const blob = await res.blob();
                player.src = URL.createObjectURL(blob);
                audioBox.style.display = 'block';
                status.className = 'status success';
                status.textContent = `✅ 완료 — ${elapsed}s (${(blob.size / 1024).toFixed(0)} KB)`;
                player.play();
            } catch (e) {
                clearInterval(timer);
                status.className = 'status error';
                status.textContent = `❌ ${e.message}`;
            } finally {
                document.querySelectorAll('.btn').forEach(b => b.disabled = false);
            }
        }

        // ── Voice Clone ───────────────────────────────────────────────
        function synthesizeClone() {
            const voiceId = $('clone-voice').value;
            if (!voiceId) { alert('음성을 선택하세요'); return; }
            const text = $('clone-text').value.trim();
            if (!text) { alert('텍스트를 입력하세요'); return; }

            const form = new FormData();
            form.append('text', text);
            form.append('language', $('clone-lang').value);

            doRequest(`${baseUrl()}/tts/voices/${voiceId}/synthesize`, form);
        }

        // ── Voice Design ──────────────────────────────────────────────
        function synthesizeDesign() {
            const text = $('design-text').value.trim();
            const instruct = $('design-instruct').value.trim();
            if (!text) { alert('텍스트를 입력하세요'); return; }
            if (!instruct) { alert('Voice Description을 입력하세요'); return; }

            const form = new FormData();
            form.append('text', text);
            form.append('instruct', instruct);
            form.append('language', $('design-lang').value);

            doRequest(`${baseUrl()}/tts/voice-design`, form);
        }

        // ── Custom Voice ──────────────────────────────────────────────
        function synthesizeCustom() {
            const speaker = $('custom-speaker').value;
            if (!speaker) { alert('스피커를 선택하세요'); return; }
            const text = $('custom-text').value.trim();
            if (!text) { alert('텍스트를 입력하세요'); return; }

            const form = new FormData();
            form.append('text', text);
            form.append('speaker', speaker);
            form.append('language', $('custom-lang').value);
            const instruct = $('custom-instruct').value.trim();
            if (instruct) form.append('instruct', instruct);

            doRequest(`${baseUrl()}/tts/custom-voice`, form);
        }
    </script>

</body>

</html>
